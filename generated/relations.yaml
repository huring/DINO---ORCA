# ------------------------------------------------------------
# Alla relationer (platt lista med from_object tillagt)
# Objekt märkta med [ej modellerat] existerar i systemet men
# saknar ännu en egen domains/-fil.
# ------------------------------------------------------------
relations:
  - id: uppdrag.rel.tillhör_delområde
    from_object: uppdrag
    label: Tillhör delområde
    target_object: delområde
    cardinality: many_to_one
    via_attribute: uppdrag.attr.delområde
    description: Uppdraget är beställt inom ett delområde.

  - id: uppdrag.rel.skapad_av_användare
    from_object: uppdrag
    label: Skapad av användare
    target_object: användare             # [ej modellerat]
    cardinality: many_to_one
    via_attribute: uppdrag.attr.skapad_av
    description: OSH-användaren som skapade uppdraget.

  - id: uppdrag.rel.tilldelad_användare
    from_object: uppdrag
    label: Tilldelad användare
    target_object: användare             # [ej modellerat]
    cardinality: many_to_one
    via_attribute: uppdrag.attr.tilldelad
    description: Utföraren som uppdraget är tilldelat.

  - id: uppdrag.rel.har_värderingar
    from_object: uppdrag
    label: Har värderingar
    target_object: värdering             # [ej modellerat]
    cardinality: one_to_many
    description: Ett uppdrag kan ha noll eller flera värderingar kopplade till sig.

  - id: uppdrag.rel.har_kontaktperson
    from_object: uppdrag
    label: Har kontaktperson
    target_object: kontaktperson         # [ej modellerat]
    cardinality: many_to_one
    description: Ett uppdrag kan ha en kontaktperson.

  - id: uppdrag.rel.har_ersättningsbelopp
    from_object: uppdrag
    label: Har ersättningsbelopp
    target_object: ersättningsbelopp     # [ej modellerat]
    cardinality: many_to_one
    via_attribute: uppdrag.attr.ersättningsbelopp
    description: Ett uppdrag kan ha ett ersättningsbelopp kopplat till sig.

  - id: delområde.rel.har_uppdrag
    from_object: delområde
    label: Har uppdrag
    target_object: uppdrag
    cardinality: one_to_many
    via_action: delområde.action.beställa_uppdrag
    description: Ett delområde kan ha ett eller flera uppdrag beställda från sig.

  - id: delområde.rel.ingår_i_fördelningsplan
    from_object: delområde
    label: Ingår i fördelningsplan
    target_object: fördelningsplan       # [ej modellerat]
    cardinality: many_to_one
    via_attribute: delområde.attr.fördelningsplan
    description: Delområdet är kopplat till ett FP.

  - id: delområde.rel.har_avtal
    from_object: delområde
    label: Har avtal
    target_object: avtal                 # [ej modellerat]
    cardinality: one_to_one
    via_attribute: delområde.attr.avtal
    description: Avtal som registrerats på delområdet.

  - id: delområde.rel.skapad_av_användare
    from_object: delområde
    label: Skapad av användare
    target_object: användare             # [ej modellerat]
    cardinality: many_to_one
    via_attribute: delområde.attr.skapad_av
    description: OSH-användaren som skapade delområdet.

  - id: delområde.rel.tillhör_sko
    from_object: delområde
    label: Tillhör SKO
    target_object: sko                   # [ej modellerat]
    cardinality: many_to_one
    description: Delområdet tillhör ett skyddsområde (SKO).

  - id: delområde.rel.har_förslag
    from_object: delområde
    label: Har förslag
    target_object: förslag               # [ej modellerat]
    cardinality: many_to_one
    description: Delområdet kan vara kopplat till ett förslag.

  - id: delområde.rel.har_kontaktperson
    from_object: delområde
    label: Har kontaktpersoner
    target_object: kontaktperson         # [ej modellerat]
    cardinality: one_to_many
    description: Ett delområde kan ha noll eller flera kontaktpersoner.

# ------------------------------------------------------------
# Relationsgraf (adjacency list per objekt)
# ------------------------------------------------------------
graph:
  uppdrag:
    - target: delområde
      cardinality: many_to_one
      relation_id: uppdrag.rel.tillhör_delområde
    - target: användare
      cardinality: many_to_one
      relation_id: uppdrag.rel.skapad_av_användare
    - target: användare
      cardinality: many_to_one
      relation_id: uppdrag.rel.tilldelad_användare
    - target: värdering
      cardinality: one_to_many
      relation_id: uppdrag.rel.har_värderingar
    - target: kontaktperson
      cardinality: many_to_one
      relation_id: uppdrag.rel.har_kontaktperson
    - target: ersättningsbelopp
      cardinality: many_to_one
      relation_id: uppdrag.rel.har_ersättningsbelopp

  delområde:
    - target: uppdrag
      cardinality: one_to_many
      relation_id: delområde.rel.har_uppdrag
    - target: fördelningsplan
      cardinality: many_to_one
      relation_id: delområde.rel.ingår_i_fördelningsplan
    - target: avtal
      cardinality: one_to_one
      relation_id: delområde.rel.har_avtal
    - target: användare
      cardinality: many_to_one
      relation_id: delområde.rel.skapad_av_användare
    - target: sko
      cardinality: many_to_one
      relation_id: delområde.rel.tillhör_sko
    - target: förslag
      cardinality: many_to_one
      relation_id: delområde.rel.har_förslag
    - target: kontaktperson
      cardinality: one_to_many
      relation_id: delområde.rel.har_kontaktperson
